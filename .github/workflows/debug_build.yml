name: Build Termux APK (arm64-v8a)

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        run: |
          git init .
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch origin ${{ github.ref_name }}
          git checkout -b ${{ github.ref_name }} FETCH_HEAD

      - name: Setup java 17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk 2>&1
          echo "## Java Info" >> $GITHUB_STEP_SUMMARY
          java -version 2>&1 >> $GITHUB_STEP_SUMMARY

      - name: Check Android SDK
        run: |
          echo "## Environment Check" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_STEP_SUMMARY
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_STEP_SUMMARY
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_STEP_SUMMARY
          echo "--- SDK paths ---" >> $GITHUB_STEP_SUMMARY
          ls /usr/local/lib/android/sdk/ 2>&1 >> $GITHUB_STEP_SUMMARY
          ls /opt/android-sdk/ 2>&1 >> $GITHUB_STEP_SUMMARY
          ls /usr/lib/android-sdk/ 2>&1 >> $GITHUB_STEP_SUMMARY
          dpkg -l 2>/dev/null | grep android >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Build APK
        shell: bash {0}
        env:
          PACKAGE_VARIANT: apt-android-7
        run: |
          set -x
          exit_on_error() { echo "$1"; exit 1; }

          CURRENT_VERSION_NAME_REGEX='\s+versionName "([^"]+)"$'
          CURRENT_VERSION_NAME="$(grep -m 1 -E "$CURRENT_VERSION_NAME_REGEX" ./app/build.gradle | sed -r "s/$CURRENT_VERSION_NAME_REGEX/\1/")"
          RELEASE_VERSION_NAME="v$CURRENT_VERSION_NAME+${GITHUB_SHA:0:7}"
          if ! printf "%s" "${RELEASE_VERSION_NAME/v/}" | grep -qP '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$'; then
           exit_on_error "Version check failed"
          fi

          APK_DIR_PATH="./app/build/outputs/apk/debug"
          APK_VERSION_TAG="$RELEASE_VERSION_NAME-$PACKAGE_VARIANT-github-debug"
          APK_BASENAME_PREFIX="termux-app_$APK_VERSION_TAG"

          echo "APK_DIR_PATH=$APK_DIR_PATH" >> $GITHUB_ENV
          echo "APK_VERSION_TAG=$APK_VERSION_TAG" >> $GITHUB_ENV
          echo "APK_BASENAME_PREFIX=$APK_BASENAME_PREFIX" >> $GITHUB_ENV

          export TERMUX_APP_VERSION_NAME="${RELEASE_VERSION_NAME/v/}"
          export TERMUX_APK_VERSION_TAG="$APK_VERSION_TAG"
          export TERMUX_PACKAGE_VARIANT="$PACKAGE_VARIANT"
          mkdir -p "$APK_DIR_PATH"
          chmod +x ./gradlew

          echo "## Gradle Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ./gradlew assembleDebug --stacktrace 2>&1 | tee /dev/stderr | head -500 >> $GITHUB_STEP_SUMMARY
          GRADLE_EXIT=$?
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ $GRADLE_EXIT -ne 0 ]; then
            echo "Gradle exit code: $GRADLE_EXIT" >> $GITHUB_STEP_SUMMARY
            exit_on_error "Build failed (exit: $GRADLE_EXIT)"
          fi

          echo "Validating APK" >> $GITHUB_STEP_SUMMARY
          if ! test -f "$APK_DIR_PATH/${APK_BASENAME_PREFIX}_arm64-v8a.apk"; then
            files_found="$(ls "$APK_DIR_PATH")"
            exit_on_error "No APK found. Files: $files_found"
          fi
          echo "APK found!" >> $GITHUB_STEP_SUMMARY

          echo "Generating sha256sum" >> $GITHUB_STEP_SUMMARY
          (cd "$APK_DIR_PATH"; sha256sum "${APK_BASENAME_PREFIX}_arm64-v8a.apk" > "${APK_BASENAME_PREFIX}_sha256sums")

      - name: Final status
        if: always()
        run: |
          echo "## Build Final Status" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find . -path '*/build/outputs/*' -type f 2>/dev/null >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY