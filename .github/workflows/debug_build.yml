name: Build Termux APK (arm64-v8a)

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repository
        run: |
          git init .
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch origin ${{ github.ref_name }}
          git checkout -b ${{ github.ref_name }} FETCH_HEAD
          git log --oneline -3

      - name: Setup java 17
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk 2>&1

      - name: Setup Android SDK
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          ls -la $ANDROID_HOME/ 2>/dev/null || echo "SDK NOT FOUND at $ANDROID_HOME"
          ls -la $ANDROID_HOME/platforms/ 2>/dev/null | head -5
          ls -la $ANDROID_HOME/build-tools/ 2>/dev/null | head -5
          ls -la $ANDROID_HOME/ndk/ 2>/dev/null | head -5
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses 2>/dev/null || echo "License accept skipped"
          echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which javac))))" >> $GITHUB_ENV
          echo "JAVA_HOME=$(dirname $(dirname $(readlink -f $(which javac))))"

      - name: Build APK
        shell: bash {0}
        env:
          PACKAGE_VARIANT: apt-android-7
        run: |
          exit_on_error() { echo "$1"; exit 1; }

          CURRENT_VERSION_NAME_REGEX='\s+versionName "([^"]+)"$'
          CURRENT_VERSION_NAME="$(grep -m 1 -E "$CURRENT_VERSION_NAME_REGEX" ./app/build.gradle | sed -r "s/$CURRENT_VERSION_NAME_REGEX/\1/")"
          RELEASE_VERSION_NAME="v$CURRENT_VERSION_NAME+${GITHUB_SHA:0:7}"
          if ! printf "%s" "${RELEASE_VERSION_NAME/v/}" | grep -qP '^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-((?:0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*)(?:\.(0|[1-9]\d*|\d*[a-zA-Z-][0-9a-zA-Z-]*))*))?(?:\+([0-9a-zA-Z-]+(?:\.[0-9a-zA-Z-]+)*))?$'; then
           exit_on_error "Version check failed"
          fi

          APK_DIR_PATH="./app/build/outputs/apk/debug"
          APK_VERSION_TAG="$RELEASE_VERSION_NAME-$PACKAGE_VARIANT-github-debug"
          APK_BASENAME_PREFIX="termux-app_$APK_VERSION_TAG"

          echo "APK_DIR_PATH=$APK_DIR_PATH" >> $GITHUB_ENV
          echo "APK_VERSION_TAG=$APK_VERSION_TAG" >> $GITHUB_ENV
          echo "APK_BASENAME_PREFIX=$APK_BASENAME_PREFIX" >> $GITHUB_ENV

          export TERMUX_APP_VERSION_NAME="${RELEASE_VERSION_NAME/v/}"
          export TERMUX_APK_VERSION_TAG="$APK_VERSION_TAG"
          export TERMUX_PACKAGE_VARIANT="$PACKAGE_VARIANT"
          mkdir -p "$APK_DIR_PATH"
          chmod +x ./gradlew

          echo "### Gradle Build" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ./gradlew assembleDebug --stacktrace 2>&1 | tee /dev/stderr >> $GITHUB_STEP_SUMMARY
          GRADLE_EXIT=$?
          echo '```' >> $GITHUB_STEP_SUMMARY
          if [ $GRADLE_EXIT -ne 0 ]; then
            echo "Gradle failed with exit code: $GRADLE_EXIT" >> $GITHUB_STEP_SUMMARY
            exit_on_error "Build failed (exit: $GRADLE_EXIT)"
          fi

      - name: Upload APK
        if: success()
        shell: bash {0}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APK_FILE=$(find . -name '*arm64-v8a*.apk' -type f | head -1)
          if [ -z "$APK_FILE" ]; then
            echo "No arm64-v8a APK found" >> $GITHUB_STEP_SUMMARY
            find . -name '*.apk' -type f >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          echo "APK: $APK_FILE ($(stat -c%s "$APK_FILE") bytes)" >> $GITHUB_STEP_SUMMARY

          SHA256_FILE="${APK_FILE}.sha256"
          (cd "$(dirname "$APK_FILE")" && sha256sum "$(basename "$APK_FILE")" > "$(basename "$SHA256_FILE"))" || exit 1

          TAG="debug-$(echo $GITHUB_SHA | cut -c1-7)"

          echo "Creating release and uploading assets..." >> $GITHUB_STEP_SUMMARY

          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "Debug APK $(echo $GITHUB_SHA | cut -c1-7)" \
            --notes "Automated debug build for commit $GITHUB_SHA" \
            --draft \
            "$APK_FILE" \
            "$SHA256_FILE" 2>&1
          RC=$?

          echo "gh release create exit code: $RC" >> $GITHUB_STEP_SUMMARY

          if [ $RC -ne 0 ]; then
            echo "gh failed, trying curl fallback..." >> $GITHUB_STEP_SUMMARY
            RESP=$(curl -s -L -X POST \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/releases" \
              -d "{\"tag_name\":\"$TAG\",\"name\":\"Debug APK ${GITHUB_SHA:0:7}\",\"draft\":true,\"target_commitish\":\"$GITHUB_SHA\"}")
            echo "$RESP" >> $GITHUB_STEP_SUMMARY
            UPLOAD_URL=$(echo "$RESP" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('upload_url','').split('{')[0])" 2>/dev/null)
            if [ -n "$UPLOAD_URL" ] && [ "$UPLOAD_URL" != "None" ]; then
              curl -s -L -X POST \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "Content-Type: application/vnd.android.package-archive" \
                "$UPLOAD_URL?name=$(basename $APK_FILE)" \
                --data-binary "@$APK_FILE" >> $GITHUB_STEP_SUMMARY
            fi
          fi

          echo "See draft at: https://github.com/${{ github.repository }}/releases/tag/$TAG" >> $GITHUB_STEP_SUMMARY
